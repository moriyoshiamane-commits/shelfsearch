
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>棚番検索</title>
<style>
body { font-size:18px; }
.item { border:1px solid #ccc; padding:6px; margin:6px 0; }
</style>
</head>
<body>

<h2>棚番検索</h2>

部品№：
<input id="partno"><br><br>

規格：
<input id="spec"><br><br>

<button onclick="search()">検索</button>

<div id="result"></div>

<script>
let lines = [];

// CSV 読み込み（TAB区切り対応）
fetch("BUSDAU.csv")
  .then(res => res.text())
  .then(text => {
    lines = text.replace(/\r/g,"").trim().split("\n");
  });

function search(){
  const p = document.getElementById("partno").value.replace(/[^0-9]/g,"");
  const s = document.getElementById("spec").value.trim();
  const out = document.getElementById("result");
  out.innerHTML = "";

  let hit = false;

  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split("\t"); // TAB区切り
    const part   = cols[0]?.trim();
    const spec   = cols[2]?.trim();
    const shelf  = cols[3]?.trim();

    if (
      (p && part === p) ||
      (s && spec.includes(s))
    ){
      const d = document.createElement("div");
      d.className = "item";
      d.textContent =
        "部品№：" + part +
        " / 規格：" + spec +
        " / 棚番：" + shelf;
      out.appendChild(d);
      hit = true;
    }
  }

  if (!hit) out.textContent = "見つかりません";
}
</script>

</body>
</html>
