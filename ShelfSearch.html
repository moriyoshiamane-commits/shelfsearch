
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>棚番検索</title>

<style>
body {
  font-size: 16px;
  margin: 10px;
}
.item {
  border: 1px solid #ccc;
  padding: 6px;
  margin: 6px 0;
}
.shelf {
  font-weight: bold;
  color: #d32f2f;
}
</style>
</head>

<body>

<h2>棚番検索</h2>

部品№：<br>
<input id="part" style="width:100%"><br><br>

規格：<br>
<input id="spec" style="width:100%"><br><br>

<button class="search-button" onclick="search()">検索</button>

<div id="result"></div>

<script>
let data = [];

// CSV読み込み（UTF-8）
fetch("BUSDAU.CSV")
  .then(res => res.text())
  .then(text => {
    const lines = text.trim().split("\n");
    lines.shift(); // ヘッダ行を除外

    data = lines.map(line => {
      const cols = line.split(",");
      return {
        part: cols[0],
        name: cols[1],
        spec: cols[2],
        shelf: cols[3]
      };
    });
  });

function search() {
  const p = document.getElementById("part").value.trim();
  const s = document.getElementById("spec").value.trim();
  const area = document.getElementById("result");
  area.innerHTML = "";

  const hits = data.filter(d =>
    (!p || d.part.includes(p)) &&
    (!s || d.spec.includes(s))
  );

  if (hits.length === 0) {
    area.innerHTML = "該当なし";
    return;
  }

  hits.forEach(d => {
    area.innerHTML += `
      <div class="item">
        部品№：${d.part}<br>
        規格：${d.spec}<br>
        棚番：<span class="shelf">${d.shelf}</span>
      </div>
    `;
  });
}
</script>

</body>
</html>
