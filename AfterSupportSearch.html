<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アフター対応検索</title>

<style>
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 16px;
  margin: 10px;
}
input {
  width: 260px;
  padding: 6px;
  font-size: 16px;
  margin-bottom: 6px;
}
button {
  padding: 6px 16px;
  font-size: 16px;
  font-weight: bold;
  color: #fff;
  background: linear-gradient(#4c8bf5, #356ac3);
  border: 1px solid #2f5fb3;
  border-radius: 6px;
  cursor: pointer;
}
.result {
  margin-top: 12px;
}
.item {
  border-bottom: 1px solid #ccc;
  padding: 8px 0;
}
</style>
</head>

<body>

<h2>アフター対応検索</h2>

客先名（部分一致）<br>
<input id="customer"><br>

電話番号（ハイフン無し・部分一致）<br>
<input id="tel"><br>

機械番号（部分一致・大小文字区別なし）<br>
<input id="machine"><br>

機種名称／型式（部分一致・大小文字区別なし）<br>
<input id="model"><br>

<button type="button" onclick="search()">検索</button>

<div id="result" class="result"></div>

<script>
let rows = [];

/*
 CSV列構成（0始まり）
 0: 客先No
 1: 客先名
 2: 機種名（取出機など）
 3: 機種名称（型式）
 4: 機械№
 5: BOX名
 6: 住所
 7: 郵便番号
 8: 電話番号
*/
fetch("MachineMaster_AfterSupport.csv")
  .then(res => res.text())
  .then(text => {
    const lines = text.replace(/\r/g, "").trim().split("\n");
    lines.shift(); // ヘッダ削除
    rows = lines.map(line => line.split(","));
  });

function search() {
  const customerInput = document.getElementById("customer").value.trim();
  const telInput      = document.getElementById("tel").value.replace(/-/g, "").trim();
  const machineInput  = document.getElementById("machine").value.trim().toLowerCase();
  const modelInput    = document.getElementById("model").value.trim().toLowerCase();
  const area          = document.getElementById("result");
  area.innerHTML = "";

  // 完全空検索のみ防止
  if (!customerInput && !telInput && !machineInput && !modelInput) {
    return;
  }

  rows.forEach(r => {
    const customerName = r[1] || "";
    const modelName    = r[3] || "";
    const machineNo    = r[4] || "";
    const boxName      = r[5] || "—"; // BOX名が無い機械にも対応
    const telNorm      = (r[8] || "").replace(/-/g, "");

    const modelLower   = modelName.toLowerCase();
    const machineLower = machineNo.toLowerCase();

    if (
      (!customerInput || customerName.includes(customerInput)) &&
      (!telInput      || telNorm.includes(telInput)) &&
      (!machineInput  || machineLower.includes(machineInput)) &&
      (!modelInput    || modelLower.includes(modelInput))
    ) {
      area.innerHTML += `
        <div class="item">
          客先名：${customerName}<br>
          電話番号：${r[8] || ""}<br>
          機種名称：${modelName}<br>
          機械№：${machineNo}<br>
          BOX名：${boxName}
        </div>
      `;
    }
  });
}
</script>

</body>
</html>
