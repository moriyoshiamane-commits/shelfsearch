<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アフター対応検索</title>

<style>
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 16px;
  margin: 10px;
}

input {
  width: 260px;
  padding: 6px;
  font-size: 16px;
  margin-bottom: 6px;
}

button {
  padding: 6px 16px;
  font-size: 16px;
  font-weight: bold;
  color: #ffffff;
  background: linear-gradient(#4c8bf5, #356ac3);
  border: 1px solid #2f5fb3;
  border-radius: 6px;
  cursor: pointer;
}

.result {
  margin-top: 12px;
}

.item {
  border-bottom: 1px solid #ccc;
  padding: 8px 0;
}
</style>
</head>

<body>

<h2>アフター対応検索</h2>

機械番号（部分一致）<br>
<input id="machine"><br>

型式（部分一致）<br>
<input id="model"><br>

<button type="button" onclick="search()">検索</button>

<div id="result" class="result"></div>

<script>
let rows = [];

/*
  CSV 読み込み（現行仕様そのまま）
*/
fetch("AfterSupport.csv")
  .then(res => res.text())
  .then(text => {
    const lines = text.replace(/\r/g, "").trim().split("\n");
    lines.shift(); // ヘッダ削除
    rows = lines.map(line => line.split(","));
  });

function search() {
  const machine = document.getElementById("machine").value.trim();
  const model   = document.getElementById("model").value.trim();
  const area    = document.getElementById("result");
  area.innerHTML = "";

  /*
    ✅ ①対策
    両方とも未入力なら、処理しない
    （= 全件ループ防止）
  */
  if (!machine && !model) {
    return;
  }

  rows.forEach(r => {
    const machineNo = r[4] || "";
    const modelName = r[3] || "";

    if (
      (!machine || machineNo.includes(machine)) &&
      (!model   || modelName.includes(model))
    ) {
      area.innerHTML += `
        <div class="item">
          受付日：${r[0]}<br>
          客先名：${r[1]}<br>
          内容　：${r[2]}<br>
          型式　：${r[3]}<br>
          機械№：${r[4]}
        </div>
      `;
    }
  });
}
</script>

</body>
</html>
