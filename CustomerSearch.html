<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客先検索</title>

<style>
body {
  font-family: sans-serif;
  font-size: 14px;
  background: #fff;
  margin: 10px;
}

h2 {
  margin-bottom: 12px;
}

/* ===== 入力欄レイアウト ===== */
.search-box {
  margin-bottom: 12px;
}

label {
  display: block;
  margin-bottom: 4px;
}

/* 入力フィールド（After対応検索と同等） */
input[type="text"] {
  width: 320px;
  height: 32px;
  font-size: 14px;
  padding: 4px 6px;
  box-sizing: border-box;
}

/* 検索ボタン（青） */
input[type="button"] {
  margin-top: 14px;
  padding: 8px 18px;
  font-size: 14px;
  color: #fff;
  background: linear-gradient(#5b8de3, #3f6ac7);
  border: none;
  border-radius: 6px;
  cursor: pointer;
  box-shadow: 0 1px 2px rgba(0,0,0,0.3);
}

/* 結果表示 */
.result {
  margin-top: 16px;
  border-top: 1px solid #999;
  padding-top: 8px;
}

.result div {
  padding: 6px 0;
  border-bottom: 1px dotted #ccc;
}
</style>
</head>

<body>

<h2>客先検索</h2>

<div class="search-box">
  <label>客先名</label>
  <input type="text" id="nameSearch">
</div>

<div class="search-box">
  <label>TEL</label>
  <input type="text" id="telSearch">
</div>

<div class="search-box">
  <label>FAX</label>
  <input type="text" id="faxSearch">
</div>

<div class="search-box">
  <label>地区</label>
  <input type="text" id="areaSearch" placeholder="例：奈良">
</div>

<input type="button" value="検索" onclick="searchCustomer()">

<div id="result" class="result"></div>

<script>
let customerMaster = [];

/* ===== CustomerMaster.csv 読み込み =====
   想定列：
   0:客先№ 1:客先名 2:地区 3:TEL 4:FAX
====================================== */
fetch('CustomerMaster.csv')
  .then(res => res.text())
  .then(text => {
    const lines = text.split('\n').slice(1);
    customerMaster = lines.map(l => {
      const c = l.split(',');
      return {
        code: (c[0] || '').trim(),
        name: (c[1] || '').trim(),
        area: (c[2] || '').trim(),
        tel:  (c[3] || '').trim(),
        fax:  (c[4] || '').trim()
      };
    });
  });

/* ===== 検索処理 ===== */
function searchCustomer() {
  const nameKey = document.getElementById('nameSearch').value.trim().toLowerCase();
  const areaKey = document.getElementById('areaSearch').value.trim().toLowerCase();
  const telKey  = document.getElementById('telSearch').value.trim();
  const faxKey  = document.getElementById('faxSearch').value.trim();
  const result  = document.getElementById('result');
  result.innerHTML = '';

  customerMaster
    .filter(c =>
      (!nameKey || c.name.toLowerCase().includes(nameKey)) &&
      (!areaKey || c.area.toLowerCase().includes(areaKey)) &&
      (!telKey  || c.tel.includes(telKey)) &&
      (!faxKey  || c.fax.includes(faxKey))
    )
    .forEach(c => {
      const div = document.createElement('div');
      div.textContent =
        `${c.code} ${c.name}（${c.area}） TEL:${c.tel} FAX:${c.fax}`;
      result.appendChild(div);
    });
}
</script>

</body>
</html>
``
