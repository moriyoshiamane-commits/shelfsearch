<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客先検索</title>

<style>
body {
  font-family: sans-serif;
  font-size: 14px;
  margin: 10px;
}

h2 {
  margin-bottom: 12px;
}

.search-box {
  margin-bottom: 12px;
}

label {
  display: block;
  margin-bottom: 4px;
}

input[type="text"] {
  width: 320px;
  height: 32px;
  font-size: 14px;
  padding: 4px 6px;
  box-sizing: border-box;
}

input[type="button"] {
  margin-top: 14px;
  padding: 8px 18px;
  font-size: 14px;
  color: #fff;
  background: linear-gradient(#5b8de3, #3f6ac7);
  border: none;
  border-radius: 6px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.3);
  cursor: pointer;
}

.result {
  margin-top: 16px;
}

.card {
  border-bottom: 1px dotted #ccc;
  padding: 8px 0;
}

.card div {
  margin: 2px 0;
}
</style>
</head>

<body>

<h2>客先検索</h2>

<div class="search-box">
  <label>客先名</label>
  <input type="text" id="nameSearch">
</div>

<div class="search-box">
  <label>TEL（ハイフン無・部分一致）</label>
  <input type="text" id="telSearch">
</div>

<div class="search-box">
  <label>FAX（ハイフン無・部分一致）</label>
  <input type="text" id="faxSearch">
</div>

<div class="search-box">
  <label>地区</label>
  <input type="text" id="areaSearch" placeholder="例：奈良">
</div>

<input type="button" value="検索" onclick="searchCustomer()">

<div id="result" class="result"></div>

<script>
let customerMaster = [];

fetch('CustomerMaster.csv')
  .then(res => res.text())
  .then(text => {
    const lines = text.split('\n').slice(1);
    customerMaster = lines.map(l => {
      const c = l.split(',');
      return {
        code: (c[0] || '').trim(),
        name: (c[1] || '').trim(),
        area: (c[2] || '').trim(),
        tel:  (c[3] || '').trim(),
        fax:  (c[4] || '').trim()
      };
    });
  });

function searchCustomer() {
  const nameKey = document.getElementById('nameSearch').value.trim().toLowerCase();
  const areaKey = document.getElementById('areaSearch').value.trim().toLowerCase();
  const telKey  = document.getElementById('telSearch').value.trim().replace(/-/g,'');
  const faxKey  = document.getElementById('faxSearch').value.trim().replace(/-/g,'');

  const result = document.getElementById('result');
  result.innerHTML = '';

  customerMaster.filter(c => {
    const tel = c.tel.replace(/-/g,'');
    const fax = c.fax.replace(/-/g,'');
    return (
      (!nameKey || c.name.toLowerCase().includes(nameKey)) &&
      (!areaKey || c.area.trim().toLowerCase().includes(areaKey)) &&
      (!telKey  || tel.includes(telKey)) &&
      (!faxKey  || fax.includes(faxKey))
    );
  }).forEach(c => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div><strong>${c.code}　${c.name}</strong></div>
      <div>地区：${c.area}</div>
      <div>TEL：${c.tel}</div>
      <div>FAX：${c.fax}</div>
    `;
    result.appendChild(card);
  });
}
</script>

</body>
</html>
``
