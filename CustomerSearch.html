<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客先検索</title>

<style>
body {
  font-family: sans-serif;
  font-size: 13px;
  background: #fff;
}

h2 {
  margin-bottom: 6px;
}

.search-box {
  margin-bottom: 10px;
}

label {
  display: inline-block;
  width: 60px;
}

input[type="text"] {
  width: 200px;
}

.result {
  margin-top: 10px;
  border-top: 1px solid #999;
  padding-top: 6px;
}

.result div {
  padding: 4px 0;
  border-bottom: 1px dotted #ccc;
}
</style>
</head>

<body>

<h2>客先検索</h2>

<div class="search-box">
  <label>客先名</label>
  <input type="text" id="nameSearch">
</div>

<div class="search-box">
  <label>地区</label>
  <input type="text" id="areaSearch" placeholder="例：奈良">
</div>

<button onclick="searchCustomer()">検索</button>

<div id="result" class="result"></div>

<script>
let customerMaster = [];

/* ===== CustomerMaster.csv 読み込み ===== */
fetch('CustomerMaster.csv')
  .then(res => res.text())
  .then(text => {
    const lines = text.split('\n').slice(1);
    customerMaster = lines.map(l => {
      const c = l.split(',');
      return {
        code: (c[0] || '').trim(),
        name: (c[1] || '').trim(),
        area: (c[2] || '').trim()
      };
    });
  });

/* ===== 検索処理（地区入力対応） ===== */
function searchCustomer() {
  const nameKey = document.getElementById('nameSearch').value.trim().toLowerCase();
  const areaKey = document.getElementById('areaSearch').value.trim().toLowerCase();
  const result = document.getElementById('result');
  result.innerHTML = '';

  customerMaster
    .filter(c =>
      (!nameKey || c.name.toLowerCase().includes(nameKey)) &&
      (!areaKey || c.area.toLowerCase().includes(areaKey))
    )
    .forEach(c => {
      const div = document.createElement('div');
      div.textContent = `${c.code} ${c.name}（${c.area}）`;
      result.appendChild(div);
    });
}
</script>

</body>
</html>
