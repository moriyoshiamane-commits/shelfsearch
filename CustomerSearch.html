<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客先検索</title>

<style>
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 16px;           /* ← スマホでも小さくならない */
  margin: 10px;
}

/* 入力欄 */
.search-input {
  width: 260px;
  padding: 6px;
  font-size: 16px;
  margin-bottom: 6px;
}

/* 検索ボタン（統一UI） */
.search-button {
  padding: 6px 14px;
  font-size: 16px;
  font-weight: bold;
  color: #ffffff;
  background: linear-gradient(#4c8bf5, #356ac3);
  border: 1px solid #2f5fb3;
  border-radius: 6px;
  cursor: pointer;
  box-shadow: 0 2px 3px rgba(0,0,0,0.25);
}

.search-button:hover {
  background: linear-gradient(#5a95f6, #3b73cf);
}

.search-button:active {
  transform: translateY(1px);
}

/* 結果テーブル */
table {
  border-collapse: collapse;
  margin-top: 10px;
  font-size: 16px;           /* ← 結果も大きく */
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: left;
}

th {
  background-color: #f0f0f0;
}
</style>
</head>

<body>

<h2>客先検索</h2>

電話番号（ハイフン無し）：<br>
<input id="tel" class="search-input"><br>

FAX番号（ハイフン無し）：<br>
<input id="fax" class="search-input"><br>

客先名（部分一致）：<br>
<input id="name" class="search-input"><br>

<button class="search-button" onclick="search()">検索</button>

<table>
  <thead>
    <tr>
      <th>客先№</th>
      <th>会社名</th>
      <th>TEL</th>
      <th>FAX</th>
      <th>県</th>
    </tr>
  </thead>
  <tbody id="result"></tbody>
</table>

<script>
let data = [];

/* CSV読み込み（UTF-8） */
fetch("CustomerSearch.csv")
  .then(res => res.text())
  .then(text => {
    const lines = text.trim().split("\n");
    lines.shift(); // ヘッダ行除外
    data = lines.map(line => line.split(","));
  });

function search() {
  const tel = document.getElementById("tel").value.trim();
  const fax = document.getElementById("fax").value.trim();
  const name = document.getElementById("name").value.trim();

  const area = document.getElementById("result");
  area.innerHTML = "";

  data.forEach(row => {
    const telNorm = row[2].replace(/-/g, "");
    const faxNorm = row[3].replace(/-/g, "");

    if (
      (!tel || telNorm.includes(tel)) &&
      (!fax || faxNorm.includes(fax)) &&
      (!name || row[1].includes(name))
    ) {
      area.innerHTML += `
        <tr>
          <td>${row[0]}</td>
          <td>${row[1]}</td>
          <td>${row[2]}</td>
          <td>${row[3]}</td>
          <td>${row[4]}</td>
        </tr>
      `;
    }
  });
}
</script>

</body>
</html>
``
