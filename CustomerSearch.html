<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客先検索</title>

<style>
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 16px;
  margin: 10px;
}

input {
  width: 260px;
  padding: 4px;
  font-size: 16px;
  margin-bottom: 6px;
}

button {
  padding: 4px 16px;
  font-size: 16px;
  cursor: pointer;
}

table {
  margin-top: 10px;
  border-collapse: collapse;
  width: 100%;
}

th, td {
  border: 1px solid #999;
  padding: 4px;
  font-size: 14px;
}
</style>
</head>

<body>

<h2>客先検索</h2>

電話番号（ハイフン無し）<br>
<input id="tel"><br>

FAX番号（ハイフン無し）<br>
<input id="fax"><br>

客先名（部分一致）<br>
<input id="name"><br>

<button type="button" onclick="search()">検索</button>

<table>
  <tr>
    <th>客先№</th>
    <th>会社名</th>
    <th>TEL</th>
    <th>FAX</th>
    <th>県</th>
  </tr>
  <tbody id="result"></tbody>
</table>

<script>
let rows = [];

fetch("CustomerSearch.csv")
  .then(r => r.text())
  .then(t => {
    const lines = t.trim().split("\n");
    lines.shift();
    rows = lines.map(l => l.split(","));
  });

function search() {
  const tel = document.getElementById("tel").value;
  const fax = document.getElementById("fax").value;
  const name = document.getElementById("name").value;
  const out = document.getElementById("result");
  out.innerHTML = "";

  rows.forEach(r => {
    const telN = r[2].replace(/-/g,"");
    const faxN = r[3].replace(/-/g,"");

    if (
      (!tel || telN.includes(tel)) &&
      (!fax || faxN.includes(fax)) &&
      (!name || r[1].includes(name))
    ) {
      out.innerHTML += `
        <tr>
          <td>${r[0]}</td>
          <td>${r[1]}</td>
          <td>${r[2]}</td>
          <td>${r[3]}</td>
          <td>${r[4]}</td>
        </tr>
      `;
    }
  });
}
</script>

</body>
</html>
