<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客先検索</title>

<style>
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 16px;
  margin: 10px;
}

.search-input {
  width: 260px;
  padding: 6px;
  font-size: 16px;
  margin-bottom: 6px;
}

.search-button {
  padding: 6px 14px;
  font-size: 16px;
  font-weight: bold;
  color: #ffffff;
  background: linear-gradient(#4c8bf5, #356ac3);
  border: 1px solid #2f5fb3;
  border-radius: 6px;
}

table {
  border-collapse: collapse;
  margin-top: 10px;
  font-size: 16px;
}

td {
  border-bottom: 1px solid #ccc;
  padding: 6px 4px;
}
</style>
</head>

<body>

<h2>客先検索</h2>

電話番号（ハイフン無し）：<br>
<input id="tel" class="search-input"><br>

FAX番号（ハイフン無し）：<br>
<input id="fax" class="search-input"><br>

客先名（部分一致）：<br>
<input id="name" class="search-input"><br>

<button class="search-button" onclick="search()">検索</button>

<table>
  <tbody id="result"></tbody>
</table>

<script>
let data = [];

fetch("CustomerSearch.csv")
  .then(res => res.text())
  .then(text => {
    const lines = text.trim().split("\n");
    lines.shift();
    data = lines.map(line => line.split(","));
  });

function search() {
  const tel = document.getElementById("tel").value.trim();
  const fax = document.getElementById("fax").value.trim();
  const name = document.getElementById("name").value.trim();
  const area = document.getElementById("result");
  area.innerHTML = "";

  data.forEach(row => {
    const telNorm = row[2].replace(/-/g, "");
    const faxNorm = row[3].replace(/-/g, "");

    if (
      (!tel || telNorm.includes(tel)) &&
      (!fax || faxNorm.includes(fax)) &&
      (!name || row[1].includes(name))
    ) {
      area.innerHTML += `
        <tr>
          <td>
            ${row[0]}<br>
            ${row[1]}<br>
            TEL:${row[2]} / FAX:${row[3]}<br>
            ${row[4]}
          </td>
        </tr>
      `;
    }
  });
}
</script>

</body>
</html>
``
