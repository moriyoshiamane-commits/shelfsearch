
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ヤマト運輸 客先№検索</title>

<style>
body {
  font-size: 16px;
  margin: 10px;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

/* 入力欄 */
.search-input {
  width: 260px;
  padding: 4px;
  font-size: 14px;
  margin-bottom: 6px;
}

/* 検索ボタン（棚番検索と同一デザイン） */
.search-button {
  padding: 6px 14px;
  font-size: 14px;
  font-weight: bold;
  color: #ffffff;

  background: linear-gradient(#4c8bf5, #356ac3);
  border: 1px solid #2f5fb3;
  border-radius: 6px;

  cursor: pointer;
  box-shadow: 0 2px 3px rgba(0,0,0,0.25);
}

.search-button:hover {
  background: linear-gradient(#5a95f6, #3b73cf);
}

.search-button:active {
  transform: translateY(1px);
  box-shadow: 0 1px 1px rgba(0,0,0,0.3);
}

/* 結果表示 */
.result {
  border: 1px solid #ccc;
  padding: 6px;
  margin: 6px 0;
}

.no {
  font-size: 18px;
  font-weight: bold;
  color: #d32f2f;
}

.center {
  font-weight: bold;
}

.office {
  font-weight: bold;
}
</style>
</head>

<body>

<h2>ヤマト運輸 客先№検索</h2>

所在地（例：大阪 城東）：<br>
<input id="keyword" class="search-input"><br>

<button class="search-button" onclick="search()">検索</button>

<div id="results"></div>

<script>
let records = [];

/* CSV読み込み（UTF-8） */
fetch("YAMATO.csv")
  .then(res => res.text())
  .then(text => {
    const lines = text.trim().split("\n");
    const headers = lines.shift().split(",").map(h => h.trim());

    records = lines.map(line => {
      const cols = line.split(",");
      const obj = {};
      headers.forEach((h, i) => {
        obj[h] = (cols[i] || "").trim();
      });
      return obj;
    });
  });

function search() {
  const key = document.getElementById("keyword").value.trim();
  const area = document.getElementById("results");
  area.innerHTML = "";

  if (!key) return;

  const words = key.split(/\s+/);

  const hits = records.filter(r => {
    const target =
      `${r["会社名"]} ${r["住所１"]} ${r["住所２"]} ${r["地区"]}`.toLowerCase();
    return words.every(w => target.includes(w.toLowerCase()));
  });

  if (hits.length === 0) {
    area.innerHTML = "該当なし";
    return;
  }

  hits.forEach(r => {
    const m = r["住所２"] ? r["住所２"].match(/([0-9]+)/) : null;
    const centerCode = m ? m[1] : "";

    area.innerHTML += `
      <div class="result">
        <div class="no">客先№：${r["客先№"]}</div>
        <div class="center">センターコード：${centerCode}</div>
        <div class="office">${r["会社名"]}</div>
        <div>${r["住所１"]}</div>
      </div>
    `;
  });
}
</script>

</body>
</html>
