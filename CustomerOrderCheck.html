<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>アインツ 商品確認</title>

<style>
  body {
    font-family: sans-serif;
    background: #ffffff;
    font-size: 13px;
  }

  /* 左寄せ・固定幅 */
  .container {
    width: 1050px;
    margin-left: 10px;
  }

  h2 {
    margin-bottom: 8px;
  }

  table {
    border-collapse: collapse;
    width: 100%;
  }

  th, td {
    border: 1px solid #999;
    padding: 3px;
  }

  th {
    background: #eeeeee;
    text-align: center;
  }

  td.no    { width: 40px; text-align: center; }
  td.code  { width: 90px; }
  td.name  { width: 230px; }
  td.spec  { width: 250px; }
  td.shelf { width: 120px; }
  td.qty   { width: 70px; text-align: center; }

  input.code {
    width: 80px;
    text-align: right;
  }

  input.qty {
    width: 50px;
    text-align: right;
  }

  .ok   { background: #c8f7c5; }
  .ng   { background: #f7c5c5; }

  textarea {
    width: 600px;
  }
</style>
</head>

<body>
<div class="container">

<h2>アインツ 商品確認</h2>

<div>
  客先№：
  <input type="text"
         id="customerCode"
         style="width:120px;"
         maxlength="8"
         placeholder="00000-00"
         oninput="formatCustomerCode(this)">
  <br>
  客先名：
  <input type="text"
         id="customerName"
         style="width:320px;"
         maxlength="40">
  <br>
  担当者名：
  <input type="text"
         id="personName"
         style="width:200px;">
</div>

<br>

<table>
<thead>
<tr>
  <th>No</th>
  <th>部品№</th>
  <th>品名</th>
  <th>規格</th>
  <th>棚番</th>
  <th>数量</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<br>

<button onclick="copyForAS400()">AS400用 コピペ作成</button>

<br><br>

<textarea id="output" rows="6"></textarea>

</div>

<script>
/* ===============================
   Eins.csv 読み込み（UTF-8）
   =============================== */
let einsData = [];

fetch('Eins.csv')
  .then(res => res.text())
  .then(text => {
    const lines = text.split('\n').slice(1);
    einsData = lines.map(l => {
      const c = l.split(',');
      return {
        code:  (c[0] || '').trim().padStart(6, '0'),
        name:  (c[1] || '').trim(),
        spec:  (c[2] || '').trim(),
        shelf: (c[4] || '').trim()
      };
    });
  });

/* ===============================
   行生成
   =============================== */
const tbody = document.getElementById('rows');

for (let i = 1; i <= 20; i++) {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="no">${i}</td>
    <td class="code">
      <input class="code"
             maxlength="6"
             oninput="this.value=this.value.replace(/[^0-9]/g,'');checkRow(this)">
    </td>
    <td class="name"></td>
    <td class="spec"></td>
    <td class="shelf"></td>
    <td class="qty">
      <input class="qty"
             maxlength="3"
             oninput="this.value=this.value.replace(/[^0-9]/g,'')">
    </td>
  `;
  tbody.appendChild(tr);
}

/* ===============================
   部品番号チェック
   =============================== */
function checkRow(el) {
  const tr = el.closest('tr');
  const codeInput = tr.querySelector('input.code').value.trim();

  const nameCell  = tr.querySelector('.name');
  const specCell  = tr.querySelector('.spec');
  const shelfCell = tr.querySelector('.shelf');

  tr.className = '';
  nameCell.textContent  = '';
  specCell.textContent  = '';
  shelfCell.textContent = '';

  if (!codeInput) return;

  const normCode = codeInput.padStart(6, '0');
  const hit = einsData.find(d => d.code === normCode);

  if (hit) {
    tr.className = 'ok';
    nameCell.textContent  = hit.name;
    specCell.textContent  = hit.spec;
    shelfCell.textContent = hit.shelf;
  } else {
    tr.className = 'ng';
    shelfCell.textContent = '該当なし';
  }
}

/* ===============================
   客先№ フォーマット制御
   形式：00000-00
   =============================== */
function formatCustomerCode(el) {
  let v = el.value.replace(/[^0-9-]/g, '');

  const parts = v.split('-');
  if (parts.length > 2) {
    v = parts[0] + '-' + parts[1];
  }

  if (v.includes('-')) {
    const [a, b] = v.split('-');
    v = a.slice(0, 5) + '-' + b.slice(0, 2);
  } else {
    v = v.slice(0, 5);
  }

  el.value = v;
}

/* ===============================
   AS400 コピペ用生成
   =============================== */
function copyForAS400() {
  let out = '';
  [...tbody.children].forEach(tr => {
    if (tr.className === 'ok') {
      const code = tr.querySelector('input.code').value.padStart(6, '0');
      const qty  = tr.querySelector('input.qty').value;
      if (qty) {
        out += `${code}\t${qty}\n`;
      }
    }
  });
  document.getElementById('output').value = out;
}
</script>

</body>
</html>
