<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>客先検索</title>
    <style>
        body {
            font-family: "Meiryo", Arial, sans-serif;
            margin: 20px;
        }

        h2 {
            margin-bottom: 15px;
        }

        .form-row {
            margin-bottom: 10px;
        }

        label {
            display: inline-block;
            width: 240px;
        }

        input {
            width: 260px;
            padding: 4px;
        }

        /* 既存画面と合わせた検索ボタン */
        .search-button {
            margin-top: 18px;
            padding: 10px 36px;
            font-size: 15px;
            font-weight: bold;
            background-color: #e6e6e6;
            color: #000;
            border: 1px solid #999;
            border-radius: 4px;
            cursor: pointer;
        }

        .search-button:hover {
            background-color: #d0d0d0;
        }

        table {
            border-collapse: collapse;
            margin-top: 25px;
            width: 100%;
        }

        th, td {
            border: 1px solid #999;
            padding: 6px;
            text-align: left;
            font-size: 14px;
        }

        th {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>

<h2>客先検索</h2>

<div class="form-row">
    <label>電話番号（ハイフン無し）</label>
    <input type="text" id="tel">
</div>

<div class="form-row">
    <label>FAX番号（ハイフン無し）</label>
    <input type="text" id="fax">
</div>

<div class="form-row">
    <label>客先名（部分一致）</label>
    <input type="text" id="customer">
</div>

<button class="search-button" onclick="searchCustomer()">検索</button>

<table id="resultTable" style="display:none;">
    <thead>
        <tr>
            <th>客先№</th>
            <th>会社名</th>
            <th>TEL</th>
            <th>FAX</th>
            <th>県</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
let customers = [];

/*
 CSV 読み込み（重要ポイント）
 ・会社名にカンマを含んでも壊れない
 ・列数が行ごとに違っても対応
 ・「後ろから列を取る」設計
*/
fetch('CustomerMaster.csv')
    .then(response => response.text())
    .then(text => {
        const lines = text.split(/\r?\n/).slice(1);

        lines.forEach(line => {
            if (!line.trim()) return;

            const cols = line.split(',');

            const code = cols[0].trim();
            const pref = cols[cols.length - 1].trim();
            const fax  = cols[cols.length - 2].trim();
            const tel  = cols[cols.length - 3].trim();
            const name = cols.slice(1, cols.length - 3).join(',').trim();

            customers.push({
                code,
                name,
                tel,
                fax,
                pref
            });
        });
    });

/* ハイフン・記号除去 */
function normalizeNumber(value) {
    return value ? value.replace(/\D/g, '') : '';
}

function searchCustomer() {
    const telInput  = normalizeNumber(document.getElementById('tel').value);
    const faxInput  = normalizeNumber(document.getElementById('fax').value);
    const nameInput = document.getElementById('customer').value.trim();

    const results = customers.filter(c => {
        let ok = true;

        // 電話番号検索（下10桁も許容）
        if (telInput) {
            const t = normalizeNumber(c.tel);
            ok = ok && (t.includes(telInput) || t.endsWith(telInput.slice(-10)));
        }

        // FAX検索
        if (faxInput) {
            ok = ok && normalizeNumber(c.fax).includes(faxInput);
        }

        // 客先名検索
        if (nameInput) {
            ok = ok && c.name.includes(nameInput);
        }

        return ok;
    });

    const tbody = document.querySelector('#resultTable tbody');
    tbody.innerHTML = '';

    results.forEach(c => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${c.code}</td>
            <td>${c.name}</td>
            <td>${c.tel}</td>
            <td>${c.fax}</td>
            <td>${c.pref}</td>
        `;
        tbody.appendChild(tr);
    });

    document.getElementById('resultTable').style.display = 'table';
}
</script>

</body>
</html>
