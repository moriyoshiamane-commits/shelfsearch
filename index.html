<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客先検索</title>

<style>
body {
    font-family: "Meiryo", Arial, sans-serif;
    margin: 16px;
    font-size: 16px;           /* ← iPhone基準サイズ */
}

h2 {
    margin-bottom: 12px;
}

/* ラベル */
.label {
    font-weight: bold;
    margin-top: 12px;
}

/* 入力欄（以前と同じ体感） */
input {
    width: 260px;
    max-width: 100%;
    padding: 8px;              /* ← 指で押しやすく */
    font-size: 16px;           /* ← iPhoneで小さくならない */
    box-sizing: border-box;
}

/* 検索ボタン（以前と同じ青） */
.search-button {
    margin-top: 16px;
    padding: 12px 24px;
    font-size: 16px;
    font-weight: bold;
    color: #ffffff;
    background-color: #007bff;
    border: 1px solid #007bff;
    border-radius: 4px;
    cursor: pointer;
}

.search-button:hover {
    background-color: #0069d9;
    border-color: #0062cc;
}

/* 検索結果（縦カード・スマホ向け） */
.result-card {
    border: 1px solid #ccc;
    margin-top: 12px;
    padding: 12px;
    border-radius: 4px;
    max-width: 100%;
    font-size: 16px;
}

.result-card .name {
    font-weight: bold;
    margin-bottom: 6px;
}
</style>
</head>

<body>

<h2>客先検索</h2>

<div class="label">電話番号（ハイフン無し）</div>
<input id="tel">

<div class="label">FAX番号（ハイフン無し）</div>
<input id="fax">

<div class="label">客先名（部分一致）</div>
<input id="customer">

<br>
<button class="search-button" onclick="searchCustomer()">検索</button>

<div id="results"></div>

<script>
let customers = [];

/* 固定列（以前成功していた方式） */
fetch("CustomerMaster.csv")
  .then(res => res.text())
  .then(text => {
      const lines = text.split(/\r?\n/).slice(1);
      lines.forEach(line => {
          if (!line.trim()) return;
          const c = line.split(",");
          customers.push({
              code: c[0]?.trim(),
              name: c[1]?.trim(),
              tel:  c[2]?.trim(),
              fax:  c[3]?.trim(),
              pref: c[4]?.trim()
          });
      });
  });

function normalize(v) {
    return v ? v.replace(/\D/g, "") : "";
}

function searchCustomer() {
    const telIn  = normalize(tel.value);
    const faxIn  = normalize(fax.value);
    const nameIn = customer.value.trim();

    const hits = customers.filter(c => {
        if (telIn  && !normalize(c.tel).includes(telIn)) return false;
        if (faxIn  && !normalize(c.fax).includes(faxIn)) return false;
        if (nameIn && !c.name.includes(nameIn)) return false;
        return true;
    });

    const area = document.getElementById("results");
    area.innerHTML = "";

    hits.forEach(c => {
        area.innerHTML += `
        <div class="result-card">
            <div class="name">${c.name}</div>
            客先№：${c.code}<br>
            電話番号：${c.tel}<br>
            FAX：${c.fax}<br>
            県：${c.pref}
        </div>`;
    });
}
</script>

</body>
</html>
