<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>客先検索</title>

<style>
body {
    font-family: "Meiryo", Arial, sans-serif;
    margin: 16px;
}

h2 {
    margin-bottom: 12px;
}

/* 入力欄は縦積み（スマホ前提） */
.label {
    font-weight: bold;
    margin-top: 10px;
}

input {
    width: 100%;
    padding: 6px;
    box-sizing: border-box;
}

/* 以前好評だった検索ボタン */
.search-button {
    margin-top: 16px;
    padding: 10px 20px;
    font-size: 15px;
    font-weight: bold;
    background-color: #e6e6e6;
    border: 1px solid #999;
    border-radius: 4px;
    cursor: pointer;
}

.search-button:hover {
    background-color: #d0d0d0;
}

/* 検索結果：カード型（縦） */
.result-card {
    border: 1px solid #ccc;
    margin-top: 12px;
    padding: 10px;
    border-radius: 4px;
}

.result-card .name {
    font-weight: bold;
    margin-bottom: 4px;
}
</style>
</head>

<body>

<h2>客先検索</h2>

<div class="label">電話番号（ハイフン無し）</div>
<input id="tel">

<div class="label">FAX番号（ハイフン無し）</div>
<input id="fax">

<div class="label">客先名（部分一致）</div>
<input id="customer">

<button class="search-button" onclick="searchCustomer()">検索</button>

<div id="results"></div>

<script>
let customers = [];

/*
  CSV読み込み（★成功していた方式）
  列番号を明示的に指定する
    cols[0] : 客先№
    cols[1] : 客先名
    cols[2] : TEL
    cols[3] : FAX
    cols[4] : 県
*/
fetch("CustomerMaster.csv")
  .then(res => res.text())
  .then(text => {
      const lines = text.split(/\r?\n/).slice(1);
      lines.forEach(line => {
          if (!line.trim()) return;
          const cols = line.split(",");
          customers.push({
              code: cols[0]?.trim(),
              name: cols[1]?.trim(),
              tel:  cols[2]?.trim(),
              fax:  cols[3]?.trim(),
              pref: cols[4]?.trim()
          });
      });
  });

function normalize(value) {
    return value ? value.replace(/\D/g, "") : "";
}

function searchCustomer() {
    const telIn  = normalize(document.getElementById("tel").value);
    const faxIn  = normalize(document.getElementById("fax").value);
    const nameIn = document.getElementById("customer").value.trim();

    const hits = customers.filter(c => {
        if (telIn  && !normalize(c.tel).includes(telIn)) return false;
        if (faxIn  && !normalize(c.fax).includes(faxIn)) return false;
        if (nameIn && !c.name.includes(nameIn)) return false;
        return true;
    });

    const area = document.getElementById("results");
    area.innerHTML = "";

    hits.forEach(c => {
        area.innerHTML += `
        <div class="result-card">
            <div class="name">${c.name}</div>
            客先№：${c.code}<br>
            電話番号：${c.tel}<br>
            FAX：${c.fax}<br>
            県：${c.pref}
        </div>`;
    });
}
</script>

</body>
</html>
